<script>

/* =========================
   PAGE KEYWORDS (100 PAGES)
========================= */
const PAGES = [
"lucky-number-calculator",
"name-numerology",
"mobile-number-numerology",
"business-name-numerology",
"baby-name-numerology",
"house-number-numerology",
"vehicle-number-numerology",
"signature-numerology",
"dob-numerology",
"name-correction",
"lucky-name-generator",
"is-my-name-lucky",
"best-number-for-success",
"numerology-number-1",
"numerology-number-2",
"numerology-number-3",
"numerology-number-4",
"numerology-number-5",
"numerology-number-6",
"numerology-number-7",
"numerology-number-8",
"numerology-number-9"
];

/* =========================
   AUTO SEO CONFIG
========================= */
function getPageData(slug){
  return {
    title: slug.replace(/-/g," ") + " Calculator",
    heading: "✨ " + slug.replace(/-/g," "),
    desc: "Free " + slug.replace(/-/g," ") + " tool using numerology."
  };
}

/* =========================
   APPLY SEO
========================= */
(function(){
  const params = new URLSearchParams(location.search);
  const page = params.get("page") || "lucky-number-calculator";

  const data = getPageData(page);

  document.title = data.title;

  const h1 = document.querySelector("h1");
  if(h1) h1.innerText = data.heading;

  const seo = document.createElement("div");
  seo.className = "card";
  seo.innerHTML = `<h2>${data.heading}</h2><p>${data.desc}</p>`;
  document.querySelector(".container").appendChild(seo);
})();

/* =========================
   GLOBAL
========================= */
let SHARE_TEXT="";

/* =========================
   CHALDEAN MAP
========================= */
const MAP={
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

/* =========================
   CORE FUNCTIONS
========================= */
function reduce(n){
  while(n>9){
    n = n.toString().split('').reduce((a,b)=>a+ +b,0);
  }
  return n;
}

function getNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
  .split('')
  .forEach(l=> sum+=MAP[l]||0);
  return sum;
}

/* =========================
   DATA
========================= */
const ROOT={
1:"Leadership, ambition and independence.",
2:"Sensitivity and intuition.",
3:"Creativity and communication.",
4:"Discipline and stability.",
5:"Freedom and adaptability.",
6:"Love and responsibility.",
7:"Spiritual thinking.",
8:"Power and success.",
9:"Compassion and wisdom."
};

const COMPOUND={
14:"Karmic debt and instability.",
16:"Sudden downfall and lessons.",
18:"Conflicts and struggles.",
23:"Very lucky number.",
26:"Financial struggles.",
32:"Creative success."
};

const LUCKY=[23,32,41,46];
const UNLUCKY=[14,16,26];

/* =========================
   SMART CORRECTION ENGINE
========================= */
function smartSuggestions(name){
  const letters=["a","e","i","o","u","h","y","n","r","l"];
  let res=[];

  letters.forEach(l=>{
    let n=name+l;
    let num=getNumber(n);
    if(LUCKY.includes(num)){
      res.push({name:n,number:num});
    }
  });

  ["aa","ee","yy","an","ra"].forEach(s=>{
    let n=name+s;
    let num=getNumber(n);
    if(LUCKY.includes(num)){
      res.push({name:n,number:num});
    }
  });

  return res.slice(0,5);
}

/* =========================
   MAIN CALCULATOR
========================= */
function calculate(){

  const name=document.getElementById("name").value.trim();
  if(!name){ alert("Enter name"); return; }

  const num=getNumber(name);
  const root=reduce(num);

  SHARE_TEXT="My lucky number is "+num+" 🔥 "+location.href;

  let html="";

  html+=`<div class="card">
    <div class="big">${num}</div>
    <p>Root Number: ${root}</p>
    ${COMPOUND[num]?`<p>${COMPOUND[num]}</p>`:""}
    <p>${ROOT[root]}</p>
  </div>`;

  html+=`<div class="card">
    <h3>🔍 What Your Name Represents</h3>
    <p>${name} corresponds to ${num}.</p>
    <p>${ROOT[root]}</p>
  </div>`;

  html+=`<div class="card">
    <h3>✨ Lucky Status</h3>
    ${
      LUCKY.includes(num)
      ? "<p style='color:lightgreen'>Very Lucky</p>"
      : UNLUCKY.includes(num)
      ? "<p style='color:red'>Not Lucky</p>"
      : "<p>Neutral</p>"
    }
  </div>`;

  /* SUGGESTIONS */
  const sug=smartSuggestions(name);
  if(sug.length){
    html+=`<div class="card"><h3>🔧 Lucky Name Suggestions</h3>`;
    sug.forEach(s=> html+=`<p>${s.name} → ${s.number}</p>`);
    html+=`</div>`;
  }

  /* SEO TEXT */
  html+=`<div class="card">
    <h2>Numerology Meaning of ${num}</h2>
    <p>
    Number ${num} represents ${ROOT[root].toLowerCase()}.
    It influences personality, destiny, and success.
    </p>
  </div>`;

  /* SHARE */
  html+=`<div class="card">
    <button onclick="wa()">WhatsApp</button>
    <button onclick="tw()">X</button>
    <button onclick="copy()">Copy Link</button>
  </div>`;

  document.getElementById("result").innerHTML=html;
}

/* =========================
   SHARE
========================= */
function wa(){
  window.open("https://wa.me/?text="+encodeURIComponent(SHARE_TEXT));
}
function tw(){
  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(SHARE_TEXT));
}
function copy(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

/* =========================
   AUTO INTERNAL LINKS
========================= */
(function(){
  let links="<div class='card'><h3>Explore Tools</h3>";
  PAGES.forEach(p=>{
    links+=`<a href='/?page=${p}'>${p.replace(/-/g," ")}</a><br>`;
  });
  links+="</div>";
  document.querySelector(".container").insertAdjacentHTML("beforeend",links);
})();

</script>
