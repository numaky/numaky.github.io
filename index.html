<script>

/* =========================
   SAFE SEO (NO BREAK)
========================= */
(function(){
  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");

  if(page){
    const title = page.replace(/-/g," ");
    document.title = title + " | Lucky Calculator";

    const h1 = document.querySelector("h1");
    if(h1) h1.innerText = "✨ " + title;
  }
})();

/* =========================
   GLOBAL
========================= */
let SHARE_TEXT="";

/* =========================
   CHALDEAN MAP
========================= */
const MAP={
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

/* =========================
   FUNCTIONS
========================= */
function reduce(n){
  while(n>9){
    n = n.toString().split('').reduce((a,b)=>a+ +b,0);
  }
  return n;
}

function getNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
  .split('')
  .forEach(l=> sum+=MAP[l]||0);
  return sum;
}

/* =========================
   DATA
========================= */
const ROOT={
1:"Leadership and independence.",
2:"Sensitivity and intuition.",
3:"Creativity and communication.",
4:"Discipline and stability.",
5:"Freedom and adaptability.",
6:"Love and responsibility.",
7:"Spiritual thinking.",
8:"Power and success.",
9:"Compassion and wisdom."
};

const COMPOUND={
14:"Karmic debt and instability.",
16:"Sudden downfall and life lessons.",
18:"Conflicts and struggles.",
23:"Very lucky number.",
26:"Financial struggles.",
32:"Creative success."
};

const LUCKY=[23,32,41,46];
const UNLUCKY=[14,16,26];

/* =========================
   SMART CORRECTION
========================= */
function smartSuggestions(name){
  const adds=["a","e","i","o","u","h","y","n"];
  let res=[];

  for(let i=0;i<adds.length;i++){
    let n=name+adds[i];
    let num=getNumber(n);
    if(LUCKY.includes(num)){
      res.push({name:n,number:num});
    }
  }

  return res.slice(0,5);
}

/* =========================
   MAIN
========================= */
function calculate(){

  const name=document.getElementById("name").value.trim();
  const dob=document.getElementById("dob").value;

  if(!name){ alert("Enter name"); return; }

  const num=getNumber(name);
  const root=reduce(num);

  SHARE_TEXT="My lucky number is "+num+" 🔥 "+window.location.href;

  let html="";

  /* RESULT */
  html+=`<div class="card">
    <div class="big">${num}</div>
    <p><b>Root Number:</b> ${root}</p>
    ${COMPOUND[num]?`<p>${COMPOUND[num]}</p>`:""}
    <p>${ROOT[root]}</p>
  </div>`;

  /* NAME MEANING */
  html+=`<div class="card">
    <h3>🔍 What Your Name Represents</h3>
    <p><b>${name}</b> corresponds to number <b>${num}</b>.</p>
    <p>${ROOT[root]}</p>
    <p>This influences personality, success and life direction.</p>
  </div>`;

  /* LUCK */
  html+=`<div class="card"><h3>✨ Lucky Status</h3>`;
  if(LUCKY.includes(num)){
    html+=`<p style="color:lightgreen">Very Lucky</p>`;
  } else if(UNLUCKY.includes(num)){
    html+=`<p style="color:red">Not Lucky</p>`;
  } else {
    html+=`<p>Neutral</p>`;
  }
  html+=`</div>`;

  /* SUGGESTIONS */
  const sug=smartSuggestions(name);
  if(sug.length){
    html+=`<div class="card"><h3>🔧 Lucky Name Suggestions</h3>`;
    sug.forEach(s=> html+=`<p>${s.name} → ${s.number}</p>`);
    html+=`</div>`;
  }

  /* LIFE PATH */
  if(dob){
    const d=new Date(dob);
    const life=reduce(d.getDate()+(d.getMonth()+1)+d.getFullYear());
    html+=`<div class="card"><p><b>Life Path:</b> ${life}</p></div>`;
  }

  /* SHARE */
  html+=`<div class="card">
    <button onclick="wa()">WhatsApp</button>
    <button onclick="tw()">X</button>
    <button onclick="copy()">Copy Link</button>
  </div>`;

  /* SIMPLE SEO TEXT */
  html+=`<div class="card">
    <h3>About Number ${num}</h3>
    <p>
    Number ${num} represents ${ROOT[root].toLowerCase()} in numerology.
    It affects your personality and life journey.
    </p>
  </div>`;

  document.getElementById("result").innerHTML=html;
}

/* =========================
   SHARE
========================= */
function wa(){
  window.open("https://wa.me/?text="+encodeURIComponent(SHARE_TEXT));
}

function tw(){
  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(SHARE_TEXT));
}

function copy(){
  navigator.clipboard.writeText(window.location.href);
  alert("Copied!");
}

</script>
