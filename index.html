<script>
/* =========================
   GLOBAL SHARE TEXT
========================= */
let CURRENT_SHARE_TEXT = "";

/* =========================
   CHALDEAN MAP
========================= */
const CHALDEAN={
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

/* =========================
   REDUCE
========================= */
function reduce(n){
  while(n>9){
    n = String(n).split('').reduce((a,b)=>a+Number(b),0);
  }
  return n;
}

/* =========================
   NAME NUMBER
========================= */
function getNameNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
  .split('')
  .forEach(l=> sum += CHALDEAN[l] || 0);
  return sum;
}

/* =========================
   COMPOUND MEANINGS
========================= */
const COMPOUND={
10:"Wheel of fortune. Destiny with ups and downs.",
11:"Spiritual insight and intuition.",
14:"Karmic debt and instability.",
16:"Sudden downfall and ego lessons.",
18:"Conflicts and emotional struggles.",
23:"Royal Star of the Lion — extremely lucky.",
26:"Financial struggles and partnership issues.",
32:"Creative success and communication power."
};

/* =========================
   ROOT MEANINGS
========================= */
const ROOT={
1:"Leadership, independence, ambition.",
2:"Sensitivity, balance, cooperation.",
3:"Creativity, communication, joy.",
4:"Hard work, stability, discipline.",
5:"Freedom, adaptability, intelligence.",
6:"Love, family, responsibility.",
7:"Spirituality, analysis, wisdom.",
8:"Power, success, money.",
9:"Compassion, humanitarian nature."
};

/* =========================
   FRIENDLY / ENEMY
========================= */
const FRIENDLY={
1:[1,2,4,7],2:[1,2,7],3:[3,6,9],
4:[1,4,8],5:[1,2,3,4,5,6,7,8,9],
6:[3,6,9],7:[1,2,7],8:[1,4,8],9:[3,6,9]
};

const ENEMY={
1:[6,8],2:[8,9],3:[4,7],
4:[3,6],5:[],6:[1,8],
7:[8],8:[2,6],9:[4,7]
};

/* =========================
   MAIN CALCULATE FUNCTION
========================= */
function calculate(){

  const name=document.getElementById("name").value.trim();
  const dob=document.getElementById("dob").value;

  if(!name){
    alert("Please enter your name");
    return;
  }

  const nameNum=getNameNumber(name);
  const root=reduce(nameNum);

  /* SAFE SHARE TEXT */
  CURRENT_SHARE_TEXT = `My lucky number is ${nameNum} 🔥 Check yours: ${window.location.href}`;

  let html=`<div class="card">`;

  html+=`<div class="big">${nameNum}</div>`;
  html+=`<p><b>Root Number:</b> ${root}</p>`;

  if(COMPOUND[nameNum]){
    html+=`<p><b>Compound Meaning:</b> ${COMPOUND[nameNum]}</p>`;
  }

  html+=`<p><b>Core Meaning:</b> ${ROOT[root]}</p>`;

  /* LIFE PATH */
  if(dob){
    const d=new Date(dob);
    const life=reduce(d.getDate()+(d.getMonth()+1)+d.getFullYear());
    html+=`<p><b>Life Path Number:</b> ${life}</p>`;
  }

  html+=`</div>`;

  /* =========================
     NAME MEANING SECTION
  ========================= */
  html+=`
  <div class="card">
    <h3 class="section-title">🔍 What Your Name Means</h3>

    <p>
      The name <b>${name}</b> resonates with number <b>${nameNum}</b>,
      influencing your personality and life direction.
    </p>

    <p>
      This number reflects <b>${ROOT[root]}</b>
    </p>

    ${
      COMPOUND[nameNum]
      ? `<p><b>Special Insight:</b> ${COMPOUND[nameNum]}</p>`
      : ''
    }

    <p>
      Your life path is strongly connected with 
      <b>${["leadership","creativity","success","spiritual growth"][root%4]}</b>.
    </p>
  </div>
  `;

  /* =========================
     FRIENDLY / ENEMY
  ========================= */
  html+=`<div class="card"><h3>✨ Friendly Numbers</h3>`;
  FRIENDLY[root].forEach(n=>html+=`<span class="tag good">${n}</span>`);
  html+=`<h3>⚠ Enemy Numbers</h3>`;
  ENEMY[root].forEach(n=>html+=`<span class="tag bad">${n}</span>`);
  html+=`</div>`;

  /* =========================
     SHARE SECTION
  ========================= */
  html+=`
  <div class="card">
    <h3 class="section-title">📤 Share Your Result</h3>

    <button onclick="shareWhatsApp()">WhatsApp</button>
    <button onclick="shareTwitter()">X (Twitter)</button>
    <button onclick="copyLink()">Copy Link</button>
  </div>
  `;

  document.getElementById("result").innerHTML=html;
}

/* =========================
   SHARE FUNCTIONS
========================= */
function shareWhatsApp(){
  window.open("https://wa.me/?text="+encodeURIComponent(CURRENT_SHARE_TEXT),"_blank");
}

function shareTwitter(){
  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(CURRENT_SHARE_TEXT),"_blank");
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
}
</script>
