<script>
/* =========================
   FIXED NAME CALCULATION
========================= */
function nameToNumber(name){
  const letters = name.toUpperCase().replace(/[^A-Z]/g,'').split('');
  let sum = 0;
  letters.forEach(l => { sum += CHALDEAN[l] || 0; });
  return sum; // ✅ keep compound number
}

/* =========================
   COMPOUND MEANINGS
========================= */
const COMPOUND_MEANINGS = {
  14:"Karmic debt — instability and change.",
  16:"Sudden downfall, ego lessons.",
  18:"Conflicts and hidden enemies.",
  23:"Royal Star of the Lion — extremely lucky.",
  26:"Financial struggles and delays.",
  32:"Creative success and communication power."
};

/* =========================
   SAFE RENDER UPDATE
========================= */
function renderResults(name, dob){

  const nameNum  = nameToNumber(name);
  const safeNum  = reduce(nameNum);
  const data     = NUM_DATA[safeNum] || NUM_DATA[1];
  const firstName = name.split(' ')[0];

  /* BIG NUMBERS */
  let nums = [
    {n: nameNum, label:'Name Number', emoji:'✨', highlight:true},
  ];

  if(dob){
    const lp = getLifePath(dob);
    const personal = getPersonalYear(dob);
    nums.push(
      {n: lp, label:'Life Path', emoji:'🌟'},
      {n: safeNum, label:'Lucky Number', emoji:'🍀'},
      {n: personal, label:'Personal Year', emoji:'🔮'}
    );
  } else {
    nums.push({n: safeNum, label:'Lucky Number', emoji:'🍀'});
  }

  document.getElementById('numGrid').innerHTML = nums.map(item=>`
    <div class="num-card ${item.highlight?'highlight':''}">
      <div class="num-emoji">${item.emoji}</div>
      <div class="big-n">${item.n}</div>
      <div class="num-label">${item.label}</div>
    </div>
  `).join('');

  /* NAME MEANING FIX */
  document.getElementById('nameMeaning').innerHTML =
    `<strong>${firstName}, your name number is ${nameNum} (${safeNum}).</strong><br/><br/>`
    + (COMPOUND_MEANINGS[nameNum]
      ? `<strong>Compound Meaning:</strong> ${COMPOUND_MEANINGS[nameNum]}<br/><br/>`
      : '')
    + data.meaning;

  /* FRIENDLY / ENEMY */
  document.getElementById('fnGrid').innerHTML = [1,2,3,4,5,6,7,8,9].map(n=>{
    let cls='fn-neutral', label='Neutral';
    if(data.friendly.includes(n)){ cls='fn-friendly'; label='Friendly'; }
    else if(data.enemy.includes(n)){ cls='fn-enemy'; label='Enemy'; }
    return `<div class="fn-num ${cls}">${n}</div>`;
  }).join('');

  /* COLORS */
  document.getElementById('colorRow').innerHTML = data.colors.map(c=>`
    <div class="color-swatch">
      <div class="swatch-dot" style="background:${c.hex}"></div>
      <span>${c.name}</span>
    </div>
  `).join('');

  /* DAYS */
  const allDays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dayPills').innerHTML = allDays.map(d=>`
    <span class="day-pill ${data.days.includes(d)?'active':'inactive'}">${d}</span>
  `).join('');

  /* DATES */
  document.getElementById('datePills').innerHTML = data.luckyDates.map(d=>`
    <div class="date-pill">${d}</div>
  `).join('');

  /* PLANET */
  document.getElementById('planetRow').innerHTML = `
    <div class="info-block">
      <div class="ib-label">Ruling Planet</div>
      <div class="ib-value">${data.planet}</div>
    </div>
  `;

  /* GEM */
  const g = data.gems;
  document.getElementById('gemCard').innerHTML = `
    <div class="gem-icon">${g.icon}</div>
    <div>
      <div class="gem-name">${g.name}</div>
      <div class="gem-desc">${g.desc}</div>
    </div>
  `;

  window._shareData = { name:firstName, nameNum, data };
}

/* =========================
   DAILY TIP (SAFE)
========================= */
const tips = [
  "Start important work on your lucky day.",
  "Use your lucky color today.",
  "Avoid enemy numbers today."
];

document.addEventListener("DOMContentLoaded",()=>{
  const tipBox = document.createElement("div");
  tipBox.className = "card";
  tipBox.innerHTML = `
    <div class="card-title">✦ Daily Lucky Tip</div>
    <p class="meaning-text">${tips[Math.floor(Math.random()*tips.length)]}</p>
  `;
  document.querySelector(".wrapper").appendChild(tipBox);
});
</script>
