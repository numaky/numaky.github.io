<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Number Calculator</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  text-align:center;
  padding:40px;
}
input,button {
  padding:12px;
  margin:10px;
  border-radius:8px;
  border:none;
}
button {
  background:#f59e0b;
  cursor:pointer;
}
.card {
  background:#1e293b;
  padding:20px;
  margin-top:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<h1>🔢 Lucky Number Calculator</h1>

<input type="text" id="name" placeholder="Enter your name">
<br>
<input type="date" id="dob">
<br>
<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<script>
/* =====================
   CHALDEAN MAP
===================== */
const CHALDEAN = {
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

/* =====================
   REDUCE FUNCTION
===================== */
function reduce(n){
  while(n>9){
    n = String(n).split('').reduce((a,b)=>a+Number(b),0);
  }
  return n;
}

/* =====================
   NAME NUMBER
===================== */
function nameNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
    .split('')
    .forEach(l=> sum += CHALDEAN[l] || 0);
  return sum; // IMPORTANT: no reduction
}

/* =====================
   COMPOUND MEANINGS
===================== */
const COMPOUND = {
14:"Karmic debt, instability",
16:"Sudden fall, ego lessons",
18:"Conflicts and struggles",
23:"Extremely lucky number",
26:"Financial struggles",
32:"Creative success"
};

/* =====================
   ROOT MEANINGS
===================== */
const ROOT = {
1:"Leader, ambitious",
2:"Sensitive, emotional",
3:"Creative, expressive",
4:"Practical, hardworking",
5:"Freedom lover",
6:"Family, harmony",
7:"Spiritual thinker",
8:"Power, success",
9:"Humanitarian"
};

/* =====================
   MAIN FUNCTION
===================== */
function calculate(){
  const name = document.getElementById("name").value.trim();
  const dob = document.getElementById("dob").value;

  if(!name){
    alert("Enter name");
    return;
  }

  const nameNum = nameNumber(name);
  const root = reduce(nameNum);

  let html = `
  <div class="card">
  <h2>Name Number: ${nameNum}</h2>
  <h3>Root Number: ${root}</h3>
  `;

  if(COMPOUND[nameNum]){
    html += `<p><b>Compound Meaning:</b> ${COMPOUND[nameNum]}</p>`;
  }

  html += `<p><b>Meaning:</b> ${ROOT[root]}</p>`;

  if(dob){
    const d = new Date(dob);
    const life = reduce(
      d.getDate() + (d.getMonth()+1) + d.getFullYear()
    );
    html += `<p><b>Life Path:</b> ${life}</p>`;
  }

  html += "</div>";

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
