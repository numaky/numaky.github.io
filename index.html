<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Numbers Calculator</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
  text-align:center;
  padding:30px;
}

.container{
  max-width:600px;
  margin:auto;
}

h1{
  color:#facc15;
}

input,button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#facc15;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  margin-top:20px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.highlight{
  color:#facc15;
  font-size:28px;
}

.small{
  color:#94a3b8;
}

.tag{
  display:inline-block;
  padding:6px 12px;
  margin:5px;
  border-radius:20px;
  background:#334155;
}

.good{background:#065f46;}
.bad{background:#7f1d1d;}
</style>
</head>

<body>

<div class="container">

<h1>✨ Lucky Number Calculator</h1>

<input type="text" id="name" placeholder="Enter your full name">
<input type="date" id="dob">

<button onclick="calculate()">Reveal My Numbers</button>

<div id="result"></div>

</div>

<script>
/* =========================
   CHALDEAN MAP
========================= */
const CHALDEAN = {
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

/* =========================
   REDUCE
========================= */
function reduce(n){
  while(n>9){
    n = String(n).split('').reduce((a,b)=>a+Number(b),0);
  }
  return n;
}

/* =========================
   NAME NUMBER
========================= */
function getNameNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
  .split('')
  .forEach(l=> sum += CHALDEAN[l] || 0);
  return sum;
}

/* =========================
   DATA
========================= */
const ROOT_MEANING={
1:"Leader, independent, ambitious",
2:"Sensitive, emotional, intuitive",
3:"Creative, expressive, joyful",
4:"Hardworking, practical, disciplined",
5:"Freedom loving, smart, adaptable",
6:"Family, love, harmony",
7:"Spiritual, thinker, introvert",
8:"Power, money, authority",
9:"Humanitarian, compassionate"
};

const COMPOUND={
14:"Karmic debt, instability and change",
16:"Sudden downfall, ego lessons",
18:"Conflicts and struggles",
23:"Extremely lucky number (Royal Star)",
26:"Financial struggles",
32:"Creative success and communication"
};

const FRIENDLY={
1:[1,2,4,7],
2:[1,2,7],
3:[3,6,9],
4:[1,4,8],
5:[1,2,3,4,5,6,7,8,9],
6:[3,6,9],
7:[1,2,7],
8:[1,4,8],
9:[3,6,9]
};

const ENEMY={
1:[6,8],
2:[8,9],
3:[4,7],
4:[3,6],
5:[],
6:[1,8],
7:[8],
8:[2,6],
9:[4,7]
};

/* =========================
   CALCULATE
========================= */
function calculate(){

  const name = document.getElementById("name").value.trim();
  const dob = document.getElementById("dob").value;

  if(!name){
    alert("Please enter your name");
    return;
  }

  const nameNum = getNameNumber(name);
  const root = reduce(nameNum);

  let html = `<div class="card">`;

  html += `<div class="highlight">${nameNum}</div>`;
  html += `<p class="small">Root Number: ${root}</p>`;

  if(COMPOUND[nameNum]){
    html += `<p><b>Compound Meaning:</b> ${COMPOUND[nameNum]}</p>`;
  }

  html += `<p><b>Meaning:</b> ${ROOT_MEANING[root]}</p>`;

  /* LIFE PATH */
  if(dob){
    const d = new Date(dob);
    const life = reduce(
      d.getDate() + (d.getMonth()+1) + d.getFullYear()
    );
    html += `<p><b>Life Path Number:</b> ${life}</p>`;
  }

  /* FRIENDLY */
  html += `<h3>Friendly Numbers</h3>`;
  FRIENDLY[root].forEach(n=>{
    html += `<span class="tag good">${n}</span>`;
  });

  /* ENEMY */
  html += `<h3>Enemy Numbers</h3>`;
  ENEMY[root].forEach(n=>{
    html += `<span class="tag bad">${n}</span>`;
  });

  /* LUCKY TIP */
  const tips=[
    "Start work on your lucky day",
    "Use your lucky number in decisions",
    "Avoid enemy numbers today",
    "Trust your intuition"
  ];

  html += `<div class="card" style="margin-top:20px;">
  <h3>✨ Daily Tip</h3>
  <p>${tips[Math.floor(Math.random()*tips.length)]}</p>
  </div>`;

  html += `</div>`;

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
