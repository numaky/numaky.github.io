<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Number Calculator | Name Numerology</title>

<style>
:root{
  --gold:#facc15;
  --bg:#020617;
  --card:#0f172a;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e2e8f0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:var(--gold);
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  margin:20px 0;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  background:linear-gradient(135deg,#facc15,#eab308);
  font-weight:bold;
  cursor:pointer;
}

.big{
  font-size:48px;
  color:var(--gold);
  font-weight:bold;
}

.tag{
  display:inline-block;
  padding:6px 14px;
  margin:5px;
  border-radius:20px;
}

.good{background:#065f46;}
.bad{background:#7f1d1d;}

.section-title{
  color:var(--gold);
}

.ad{
  background:#111827;
  border:1px dashed #334155;
  padding:15px;
  text-align:center;
  margin:20px 0;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>✨ Lucky Number Calculator</h1>

<div class="card">
<input type="text" id="name" placeholder="Enter your full name">
<input type="date" id="dob">
<button onclick="calculate()">Reveal My Numbers</button>
</div>

<div class="ad">Ad Space (Add AdSense later)</div>

<div id="result"></div>

<div class="card">
<h2 class="section-title">📘 About Numerology</h2>
<p>
Numerology reveals hidden meanings behind numbers in your name and birth date.
It helps understand personality, success patterns, and life direction.
</p>
</div>

</div>

<script>
const CHALDEAN={
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

function reduce(n){
  while(n>9){
    n = String(n).split('').reduce((a,b)=>a+Number(b),0);
  }
  return n;
}

function getNameNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
  .split('')
  .forEach(l=> sum += CHALDEAN[l] || 0);
  return sum;
}

const ROOT_MEANING={
1:"Leader, ambitious",
2:"Emotional, intuitive",
3:"Creative, expressive",
4:"Practical, hardworking",
5:"Freedom loving",
6:"Family oriented",
7:"Spiritual thinker",
8:"Power and success",
9:"Humanitarian"
};

const COMPOUND={
14:"Karmic debt, instability",
16:"Sudden downfall",
18:"Conflicts",
23:"Very lucky number",
26:"Financial struggles",
32:"Creative success"
};

const FRIENDLY={
1:[1,2,4,7],2:[1,2,7],3:[3,6,9],
4:[1,4,8],5:[1,2,3,4,5,6,7,8,9],
6:[3,6,9],7:[1,2,7],8:[1,4,8],9:[3,6,9]
};

const ENEMY={
1:[6,8],2:[8,9],3:[4,7],
4:[3,6],5:[],6:[1,8],
7:[8],8:[2,6],9:[4,7]
};

function calculate(){

  const name=document.getElementById("name").value.trim();
  const dob=document.getElementById("dob").value;

  if(!name){alert("Enter name");return;}

  const nameNum=getNameNumber(name);
  const root=reduce(nameNum);

  let html=`<div class="card">`;

  html+=`<div class="big">${nameNum}</div>`;
  html+=`<p>Root Number: ${root}</p>`;

  if(COMPOUND[nameNum]){
    html+=`<p><b>Compound Meaning:</b> ${COMPOUND[nameNum]}</p>`;
  }

  html+=`<p><b>Meaning:</b> ${ROOT_MEANING[root]}</p>`;

  if(dob){
    const d=new Date(dob);
    const life=reduce(d.getDate()+(d.getMonth()+1)+d.getFullYear());
    html+=`<p><b>Life Path:</b> ${life}</p>`;
  }

  html+=`<h3 class="section-title">✨ Friendly Numbers</h3>`;
  FRIENDLY[root].forEach(n=>html+=`<span class="tag good">${n}</span>`);

  html+=`<h3 class="section-title">⚠ Enemy Numbers</h3>`;
  ENEMY[root].forEach(n=>html+=`<span class="tag bad">${n}</span>`);

  html+=`</div>`;

  /* 🔥 WHAT YOUR NAME MEANS (IMPORTANT) */
  html+=`
  <div class="card">
    <h3 class="section-title">🔍 What Your Name Means</h3>
    <p>
      The name <b>${name}</b> carries the vibration of number <b>${nameNum}</b>.
      This influences your personality and destiny.
    </p>

    <p>
      People with this number are typically <b>${ROOT_MEANING[root]}</b>.
    </p>

    ${
      COMPOUND[nameNum] 
      ? `<p><b>Special Insight:</b> ${COMPOUND[nameNum]}</p>` 
      : ''
    }

    <p>
      Your life path is connected with 
      <b>${["leadership","creativity","success","spiritual growth"][root % 4]}</b>.
    </p>
  </div>
  `;

  /* DAILY TIP */
  const tips=[
    "Start important work today",
    "Use your lucky number",
    "Avoid risky decisions",
    "Trust your intuition"
  ];

  html+=`<div class="card">
  <h3 class="section-title">💡 Daily Tip</h3>
  <p>${tips[Math.floor(Math.random()*tips.length)]}</p>
  </div>`;

  html+=`<div class="ad">Ad Space</div>`;

  document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
