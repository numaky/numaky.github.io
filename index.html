<script>

/* =========================
   RUN AFTER PAGE LOAD (CRITICAL FIX)
========================= */
window.onload = function(){

/* =========================
   GLOBAL
========================= */
let SHARE_TEXT="";

/* =========================
   CHALDEAN MAP
========================= */
const MAP={
A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,
R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
};

/* =========================
   FUNCTIONS
========================= */
function reduce(n){
  while(n>9){
    n = n.toString().split('').reduce(function(a,b){ return a + Number(b); },0);
  }
  return n;
}

function getNumber(name){
  let sum=0;
  name.toUpperCase().replace(/[^A-Z]/g,'')
  .split('')
  .forEach(function(l){ sum+=MAP[l]||0; });
  return sum;
}

/* =========================
   DATA
========================= */
const ROOT={
1:"Leadership and independence.",
2:"Sensitivity and intuition.",
3:"Creativity and communication.",
4:"Discipline and stability.",
5:"Freedom and adaptability.",
6:"Love and responsibility.",
7:"Spiritual thinking.",
8:"Power and success.",
9:"Compassion and wisdom."
};

const COMPOUND={
14:"Karmic debt and instability.",
16:"Sudden downfall and lessons.",
18:"Conflicts and struggles.",
23:"Very lucky number.",
26:"Financial struggles.",
32:"Creative success."
};

const LUCKY=[23,32,41,46];
const UNLUCKY=[14,16,26];

/* =========================
   SMART SUGGESTIONS
========================= */
function smartSuggestions(name){
  const adds=["a","e","i","o","u","h","y","n"];
  let res=[];

  for(let i=0;i<adds.length;i++){
    let newName=name+adds[i];
    let num=getNumber(newName);
    if(LUCKY.indexOf(num)!==-1){
      res.push({name:newName,number:num});
    }
  }
  return res.slice(0,5);
}

/* =========================
   MAIN FUNCTION
========================= */
window.calculate = function(){

  const name=document.getElementById("name").value.trim();
  const dob=document.getElementById("dob").value;

  if(!name){ alert("Enter name"); return; }

  const num=getNumber(name);
  const root=reduce(num);

  SHARE_TEXT="My lucky number is "+num+" 🔥 "+window.location.href;

  let html="";

  html+="<div class='card'>";
  html+="<div class='big'>"+num+"</div>";
  html+="<p><b>Root Number:</b> "+root+"</p>";

  if(COMPOUND[num]){
    html+="<p>"+COMPOUND[num]+"</p>";
  }

  html+="<p>"+ROOT[root]+"</p>";
  html+="</div>";

  /* NAME MEANING */
  html+="<div class='card'>";
  html+="<h3>🔍 What Your Name Represents</h3>";
  html+="<p><b>"+name+"</b> corresponds to number <b>"+num+"</b>.</p>";
  html+="<p>"+ROOT[root]+"</p>";
  html+="<p>This influences your personality and life direction.</p>";
  html+="</div>";

  /* LUCK */
  html+="<div class='card'><h3>✨ Lucky Status</h3>";
  if(LUCKY.indexOf(num)!==-1){
    html+="<p style='color:lightgreen'>Very Lucky</p>";
  } else if(UNLUCKY.indexOf(num)!==-1){
    html+="<p style='color:red'>Not Lucky</p>";
  } else {
    html+="<p>Neutral</p>";
  }
  html+="</div>";

  /* SUGGESTIONS */
  const sug=smartSuggestions(name);
  if(sug.length){
    html+="<div class='card'><h3>🔧 Lucky Name Suggestions</h3>";
    for(let i=0;i<sug.length;i++){
      html+="<p>"+sug[i].name+" → "+sug[i].number+"</p>";
    }
    html+="</div>";
  }

  /* LIFE PATH */
  if(dob){
    const d=new Date(dob);
    const life=reduce(d.getDate()+(d.getMonth()+1)+d.getFullYear());
    html+="<div class='card'><p><b>Life Path:</b> "+life+"</p></div>";
  }

  /* SHARE */
  html+="<div class='card'>";
  html+="<button onclick='wa()'>WhatsApp</button>";
  html+="<button onclick='tw()'>X</button>";
  html+="<button onclick='copyLink()'>Copy Link</button>";
  html+="</div>";

  document.getElementById("result").innerHTML=html;
};

/* =========================
   SHARE FUNCTIONS
========================= */
window.wa=function(){
  window.open("https://wa.me/?text="+encodeURIComponent(SHARE_TEXT));
};

window.tw=function(){
  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(SHARE_TEXT));
};

window.copyLink=function(){
  navigator.clipboard.writeText(window.location.href);
  alert("Copied!");
};

}; // END window.onload

</script>
